name: toybox
description: ToyBox - Share Joy, Exchange Toys

publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_contacts: ^2.0.0
  # Networking
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.2

  # Fonts
  google_fonts: ^6.1.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
